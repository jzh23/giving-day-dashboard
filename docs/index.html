<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project Teams Giving Day Leaderboard</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Project Teams Giving Day Leaderboard</h1>
        <p id="updated-at">Last update: loading...</p>
      </header>

      <section class="panel totals-panel">
        <h2>Latest Totals</h2>
        <table>
          <thead>
            <tr>
              <th>Team</th>
              <th data-sort-key="raised">Amount Raised</th>
              <th data-sort-key="donors">Donors</th>
              <th data-sort-key="raisedPerDonor">$/Donor</th>
              <th data-sort-key="donorsPerMember">Donors/Member</th>
            </tr>
          </thead>
          <tbody id="totals-body"></tbody>
        </table>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
