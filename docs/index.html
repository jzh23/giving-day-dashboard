<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Giving Day Dashboard</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Giving Day Dashboard</h1>
        <p id="updated-at">Last update: loading...</p>
      </header>

      <section class="panel totals-panel">
        <h2>Latest Totals</h2>
        <table>
          <thead>
            <tr>
              <th>
                <button type="button" class="sort-button" data-sort-key="team" data-label="Team">Team</button>
              </th>
              <th>
                <button type="button" class="sort-button" data-sort-key="raised" data-label="Amount Raised">
                  Amount Raised
                </button>
              </th>
              <th>
                <button type="button" class="sort-button" data-sort-key="donors" data-label="Donors">Donors</button>
              </th>
              <th>
                <button type="button" class="sort-button" data-sort-key="donorsPerMember" data-label="Donors/Member">
                  Donors/Member
                </button>
              </th>
            </tr>
          </thead>
          <tbody id="totals-body"></tbody>
        </table>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
